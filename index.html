<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Chess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section id="start-screen" class="start-screen">
      <div class="start-card">
        <div class="start-hero">
          <div class="start-team start-team-white" aria-hidden="true">
            <img class="start-character start-character-king" src="assets/pieces/white-king.png" alt="">
            <img class="start-character start-character-bishop" src="assets/pieces/white-bishop.png" alt="">
          </div>
          <div class="start-versus" aria-hidden="true">
            <span class="start-versus-badge">VS</span>
          </div>
          <div class="start-team start-team-black" aria-hidden="true">
            <img class="start-character start-character-king" src="assets/pieces/black-king.png" alt="">
            <img class="start-character start-character-knight" src="assets/pieces/black-knight.png" alt="">
          </div>
        </div>
        <div class="start-main">
          <h1>Kids Chess Game</h1>
          <p id="start-help-text" class="start-text">Choose how you want to play.</p>

          <div class="selection-group" aria-label="Game mode">
            <div class="button-row">
              <button type="button" class="choice-button" data-mode-option="single">
                Single Player
              </button>
              <button type="button" class="choice-button" data-mode-option="two">
                Two Player
              </button>
            </div>
          </div>

          <div id="level-group" class="selection-group is-hidden" aria-label="Difficulty level">
            <h2>Choose a Level</h2>
            <div class="level-grid">
              <button type="button" class="choice-button" data-level-option="1">Level 1</button>
              <button type="button" class="choice-button" data-level-option="2">Level 2</button>
              <button type="button" class="choice-button" data-level-option="3">Level 3</button>
              <button type="button" class="choice-button" data-level-option="4">Level 4</button>
              <button type="button" class="choice-button" data-level-option="5">Level 5</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="game-screen" class="game-screen is-hidden" aria-label="Chess game">
      <header class="hero">
        <h1>Kids Chess Game</h1>
        <p id="game-status">White's turn.</p>
      </header>

      <section class="game-hud" aria-label="Current game settings">
        <div class="info-pill">
          <span class="info-label">Mode</span>
          <strong id="mode-display">Single Player</strong>
        </div>
        <div class="info-pill">
          <span class="info-label">Level</span>
          <strong id="level-display">-</strong>
        </div>
        <div id="turn-pill" class="info-pill">
          <span class="info-label">Turn</span>
          <strong id="turn-display">White</strong>
        </div>
        <button id="guide-toggle-button" type="button" class="info-pill hud-toggle-button" aria-pressed="true">
          <span class="info-label">Guide</span>
          <strong id="guide-display">On</strong>
        </button>
        <button id="new-game-button" type="button" class="small-button">New Game</button>
      </section>

      <div id="promotion-overlay" class="promotion-overlay is-hidden" aria-live="polite">
        <div class="promotion-card">
          <h2 id="promotion-title">Choose a New Hero</h2>
          <div id="promotion-options" class="promotion-options"></div>
        </div>
      </div>

      <section class="board-shell" aria-label="Chess board game area">
        <div id="captured-white" class="captured-strip captured-strip-left" aria-label="Captured white pieces"></div>
        <section class="board-area">
          <div id="victory-overlay" class="victory-overlay is-hidden" aria-live="polite">
            <div class="victory-card">
              <div id="victory-left-piece" class="victory-piece-slot" aria-hidden="true"></div>
              <div class="victory-text">
                <h2 id="victory-title">White Wins!</h2>
                <p id="victory-message">The king has fallen.</p>
              </div>
              <div id="victory-right-piece" class="victory-piece-slot" aria-hidden="true"></div>
            </div>
          </div>
          <div class="board-stage">
            <div id="board-frame" class="board-frame">
              <div
                id="chessboard"
                class="chessboard"
                role="grid"
                aria-label="8 by 8 chess board"
              ></div>
            </div>
          </div>
        </section>
        <div id="captured-black" class="captured-strip captured-strip-right" aria-label="Captured black pieces"></div>
      </section>
    </section>
  </main>

  <div id="animation-layer" class="animation-layer" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
