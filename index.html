<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Chess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Kids Chess Game</h1>
      <p id="game-status">White's turn. Pick a piece to get started.</p>
    </header>

    <section class="board-area" aria-label="Chess board game area">
      <div class="board-frame">
        <div
          id="chessboard"
          class="chessboard"
          role="grid"
          aria-label="8 by 8 chess board"
        ></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
